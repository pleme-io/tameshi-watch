apiVersion: v1
kind: Pod
metadata:
  name: {{ include "tameshi-watch.fullname" . }}-test-health
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tameshi-watch.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health-check
      image: busybox:1.36
      command:
        - wget
        - --spider
        - --timeout=5
        - http://{{ include "tameshi-watch.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.service.healthPort }}/healthz
