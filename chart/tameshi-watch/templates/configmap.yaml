apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tameshi-watch.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tameshi-watch.labels" . | nindent 4 }}
data:
  tameshi-watch.yaml: |
    log_level: {{ .Values.config.logLevel | quote }}
    log_format: {{ .Values.config.logFormat | quote }}
    health_port: {{ .Values.health.port }}
    metrics_enabled: {{ .Values.metrics.enabled }}
    metrics_port: {{ .Values.metrics.port }}
    severity_threshold: {{ .Values.config.severityThreshold | quote }}
    poll_intervals:
      nvd: {{ .Values.config.pollIntervals.nvd }}
      osv: {{ .Values.config.pollIntervals.osv }}
      github: {{ .Values.config.pollIntervals.github }}
      profiles: {{ .Values.config.pollIntervals.profiles }}
    endpoints:
      nvd: {{ .Values.config.endpoints.nvd | quote }}
      osv: {{ .Values.config.endpoints.osv | quote }}
      github: {{ .Values.config.endpoints.github | quote }}
    kensa:
      url: {{ .Values.config.kensa.url | quote }}
    kanshi:
      url: {{ .Values.config.kanshi.url | quote }}
    ecosystems:
      {{- toYaml .Values.config.ecosystems | nindent 6 }}
    {{- if .Values.persistence.enabled }}
    state_dir: {{ .Values.persistence.mountPath | quote }}
    {{- end }}
