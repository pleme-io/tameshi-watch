---
# Production: sekiban webhook in enforce mode
# Rejects deployments that lack valid tameshi attestation signatures
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sekiban
  namespace: pleme-attestation
spec:
  values:
    replicaCount: 2

    webhook:
      failurePolicy: Fail

    config:
      enforcementMode: enforce

    pdb:
      enabled: true
      minAvailable: 1
