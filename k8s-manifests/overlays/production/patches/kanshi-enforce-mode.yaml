---
# Production: kanshi eBPF in enforce mode
# Blocks execution of unattested binaries via LSM hooks
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kanshi
  namespace: pleme-attestation
spec:
  values:
    enforcement:
      mode: enforce
      defaultPolicy: enforce

    heartbeat:
      enabled: true
      emitter: prometheus
