apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tameshi attestation framework infrastructure
# Aggregates all components of the attestation pipeline

resources:
  # Admission webhook — gates deployments on cryptographic signatures
  - sekiban/
  # Compliance engine — NIST 800-53/OSCAL assessments, two-phase certification
  - kensa/
  # eBPF runtime sentinel — verifies running binary integrity via LSM hooks
  - kanshi/
  # Continuous ingestion daemon — polls NVD/OSV/GitHub for vulnerability data
  - tameshi-watch/
